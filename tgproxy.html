<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto Proxies</title>
    <style>
        :root {
            --bg-color: #0e0e10;
            --container-bg: #16161a;
            --item-bg: #212127;
            --item-hover: #2b2b32;
            --text-main: #f4f4f6;
            --text-muted: #797986;
            --accent: #2AABEE;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Настоящая консоль Матрицы: моноширинный шрифт, тусклый зеленый, без лишней яркости */
        #debug-log {
            width: 100%;
            max-width: 600px;
            background: #020502;
            border: 1px solid #005500;
            color: #00aa00;
            text-shadow: 0 0 2px rgba(0, 170, 0, 0.4);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.3;
            white-space: pre-wrap;
            word-break: break-all;
            box-sizing: border-box;
            opacity: 1;
            transition: opacity 0.6s ease, margin 0.6s ease, padding 0.6s ease;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--container-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.3rem;
            margin: 0 0 4px 0;
            text-align: center;
        }
        .info {
            text-align: center;
            margin-bottom: 16px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .proxy-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        /* Компактная строка-кнопка под размер пальца */
        .proxy-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            height: 46px; /* Идеально для тапа по гайдлайнам мобильной разработки */
            background: var(--item-bg);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            transition: background 0.15s ease;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .proxy-item:hover, .proxy-item:active {
            background: var(--item-hover);
        }
        .proxy-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .proxy-num {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 0.85rem;
            min-width: 20px;
        }
        .proxy-host {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            color: #e2e2e9;
        }
        .connect-badge {
            background: rgba(42, 171, 238, 0.15);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 6px;
            white-space: nowrap;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .proxy-item:hover .connect-badge, .proxy-item:active .connect-badge {
            background: var(--accent);
            color: #fff;
        }
        .status {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div id="debug-log">[SYS]: Init debug core...</div>

<div class="container">
    <h1>MTProto Telegram Proxies</h1>
    <div class="info">Автоматический пул из SoliSpirit/mtproto</div>
    
    <div id="status" class="status">Загрузка потоков...</div>
    <div id="proxy-list" class="proxy-list"></div>
</div>

<script>
    const logEl = document.getElementById('debug-log');
    function writeLog(msg) {
        console.log(msg);
        if (logEl) logEl.innerText += '\n' + msg;
    }

    window.addEventListener('error', function(e) {
        writeLog(`[ERR]: ${e.message}`);
    });

    writeLog('[OK]: Logger active.');

    let tg = null;

    function initTelegramSDK() {
        const script = document.createElement('script');
        script.src = 'https://telegram.org/js/telegram-web-app.js';
        script.async = true;
        script.onload = function() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    writeLog('[OK]: TG SDK bound.');
                }
            } catch (err) {
                writeLog('[WRN]: SDK error.');
            }
        };
        document.head.appendChild(script);
    }

    async function fetchWithTimeout(url, timeout = 4000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        return fetch(url, { signal: controller.signal }).then(res => {
            clearTimeout(id);
            return res;
        }).catch(err => {
            clearTimeout(id);
            throw err;
        });
    }

    async function loadProxies() {
        const listContainer = document.getElementById('proxy-list');
        const statusEl = document.getElementById('status');
        
        const timestamp = Date.now();
        const endpoints = [
            { name: 'Fastly', url: `https://fastly.jsdelivr.net/gh/SoliSpirit/mtproto@master/all_proxies.txt?_=${timestamp}` },
            { name: 'GCore', url: `https://gcore.jsdelivr.net/gh/SoliSpirit/mtproto@master/all_proxies.txt?_=${timestamp}` },
            { name: 'jsDelivr', url: `https://cdn.jsdelivr.net/gh/SoliSpirit/mtproto@master/all_proxies.txt?_=${timestamp}` }
        ];
        
        let text = '';
        for (const target of endpoints) {
            try {
                writeLog(`[NET]: Requesting ${target.name}...`);
                const response = await fetchWithTimeout(target.url, 4000);
                if (response.ok) {
                    text = await response.text();
                    if (text && text.trim().length > 0) {
                        writeLog(`[OK]: Payload received (${text.length} B).`);
                        break;
                    }
                }
            } catch (e) {
                writeLog(`[FAIL]: ${target.name} downstream.`);
            }
        }
        
        if (!text) {
            statusEl.innerHTML = '<span style="color:#ff6b6b;">Network error.</span>';
            return;
        }
        
        const lines = text.split('\n')
            .map(l => l.trim())
            .filter(l => l.startsWith('https://t.me/proxy') || l.startsWith('tg://proxy'));
        
        statusEl.style.display = 'none';
        listContainer.innerHTML = '';
        
        lines.forEach((line, index) => {
            let serverName = 'Proxy';
            try {
                const cleanUrl = line.replace('tg://', 'https://t.me/');
                const urlObj = new URL(cleanUrl);
                serverName = urlObj.searchParams.get('server') || serverName;
            } catch (e) { return; }

            const webLink = line.replace('tg://', 'https://t.me/');
            const deepLink = line.replace('https://t.me/', 'tg://');

            const item = document.createElement('a');
            item.className = 'proxy-item';
            item.href = deepLink;
            
            item.innerHTML = `
                <div class="proxy-left">
                    <span class="proxy-num">#${index + 1}</span>
                    <span class="proxy-host">${serverName}</span>
                </div>
                <div class="connect-badge">ТГ</div>
            `;

            item.addEventListener('click', (e) => {
                const isInsideTelegram = tg && tg.platform !== 'unknown' && tg.initData && tg.initData.length > 0;
                if (isInsideTelegram && typeof tg.openTelegramLink === 'function') {
                    e.preventDefault();
                    tg.openTelegramLink(webLink);
                }
            });

            listContainer.appendChild(item);
        });
        
        writeLog('[DONE]: Render complete.');
        
        // Матрица плавно растворяется исчезая через 1.5 секунды после окончания работ
        setTimeout(() => {
            if (logEl) {
                logEl.style.opacity = '0';
                logEl.style.marginBottom = '0px';
                logEl.style.padding = '0px';
                setTimeout(() => logEl.remove(), 600);
            }
        }, 1500);
    }

    initTelegramSDK();
    loadProxies().catch(err => writeLog('[ERR]: Main thread crash.'));
</script>

</body>
</html>
