<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto Telegram Proxies</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --item-bg: #2d2d2d;
            --item-hover: #383838;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --link-color: #4da8da;
            --accent: #2AABEE;
            --search-bg: #252525;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Консоль в стиле Матрицы */
        #debug-log {
            width: 100%;
            max-width: 800px;
            background: #030a03;
            border: 1px solid #00ff00;
            color: #33ff33;
            text-shadow: 0 0 4px rgba(0, 255, 0, 0.6);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            box-sizing: border-box;
            opacity: 1;
            transition: opacity 0.8s ease, margin 0.8s ease;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }
        h1 {
            color: var(--text-main);
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
        }
        .info {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            background: var(--search-bg);
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--accent);
        }
        .proxy-list {
            list-style: none;
            padding: 0;
            margin: 0;
            counter-reset: proxy-counter;
        }
        .proxy-item {
            position: relative;
            margin-bottom: 12px;
            padding: 14px 14px 14px 60px;
            background: var(--item-bg);
            border-radius: 10px;
            transition: background 0.2s ease, transform 0.1s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            text-decoration: none;
        }
        .proxy-item:hover {
            background: var(--item-hover);
            transform: translateY(-1px);
        }
        .proxy-item::before {
            counter-increment: proxy-counter;
            content: counter(proxy-counter);
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: bold;
            font-size: 1.1em;
            width: 35px;
            text-align: left;
        }
        .proxy-header {
            color: var(--link-color);
            font-weight: bold;
            font-size: 1.05em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .tg-icon {
            background: var(--accent);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .proxy-raw {
            font-family: monospace;
            color: var(--text-muted);
            font-size: 0.8em;
            word-break: break-all;
            background: rgba(0,0,0,0.2);
            padding: 6px 10px;
            border-radius: 6px;
            user-select: all;
        }
        .status {
            text-align: center;
            font-style: italic;
            color: var(--text-muted);
            padding: 40px 0;
        }
    </style>
</head>
<body>

<div id="debug-log">[SYSTEM]: Инициализация ядра отладки...</div>

<div class="container">
    <h1>MTProto Telegram Proxies</h1>
    <div class="info">Автоматический отказоустойчивый список</div>
    
    <input type="text" id="search" class="search-box" placeholder="Поиск по домену или порту...">
    
    <div id="status" class="status">Загрузка актуальных прокси...</div>
    <div id="proxy-list" class="proxy-list"></div>
</div>

<script>
    const logEl = document.getElementById('debug-log');
    function writeLog(msg) {
        console.log(msg);
        if (logEl) logEl.innerText += '\n' + msg;
    }

    window.addEventListener('error', function(e) {
        writeLog(`[ERROR]: ${e.message} в ${e.filename}:${e.lineno}`);
    });
    window.addEventListener('unhandledrejection', function(e) {
        writeLog(`[PROMISE_REJECTED]: ${e.reason}`);
    });

    writeLog('[OK]: Логгер запущен. Перехват потоков активен.');

    let tg = null;

    function initTelegramSDK() {
        writeLog('[INFO]: Запрос дескриптора Telegram SDK...');
        const script = document.createElement('script');
        script.src = 'https://telegram.org/js/telegram-web-app.js';
        script.async = true;
        script.onload = function() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    writeLog('[OK]: Telegram SDK успешно интегрирован.');
                }
            } catch (err) {
                writeLog('[WARN]: Ошибка инициализации SDK: ' + err.message);
            }
        };
        script.onerror = function() {
            writeLog('[WARN]: Telegram SDK недоступен. Автономный режим.');
        };
        document.head.appendChild(script);
    }

    async function fetchWithTimeout(url, timeout = 5000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        return fetch(url, { signal: controller.signal }).then(res => {
            clearTimeout(id);
            return res;
        }).catch(err => {
            clearTimeout(id);
            throw err;
        });
    }

    async function loadProxies() {
        const listContainer = document.getElementById('proxy-list');
        const statusEl = document.getElementById('status');
        const searchInput = document.getElementById('search');
        
        const timestamp = Date.now();
        const endpoints = [
            { name: 'Fastly CDN', url: `https://fastly.jsdelivr.net/gh/SoliSpirit/mtproto@master/all_proxies.txt?_=${timestamp}` },
            { name: 'GCore CDN', url: `https://gcore.jsdelivr.net/gh/SoliSpirit/mtproto@master/all_proxies.txt?_=${timestamp}` },
            { name: 'Основной jsDelivr', url: `https://cdn.jsdelivr.net/gh/SoliSpirit/mtproto@master/all_proxies.txt?_=${timestamp}` },
            { name: 'AllOrigins PROXY', url: `https://api.allorigins.win/raw?url=${encodeURIComponent('https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt')}&_=${timestamp}` }
        ];
        
        let text = '';
        
        for (const target of endpoints) {
            try {
                writeLog(`[NET]: Запрос к зеркалу: ${target.name}...`);
                const response = await fetchWithTimeout(target.url, 5000);
                if (response.ok) {
                    text = await response.text();
                    if (text && text.trim().length > 0) {
                        writeLog(`[OK]: Поток получен от ${target.name}. Размер: ${text.length} байт.`);
                        break;
                    }
                }
            } catch (e) {
                writeLog(`[FAIL]: Сбой зеркала ${target.name}: ${e.message}`);
            }
        }
        
        if (!text) {
            statusEl.innerHTML = '<span style="color:#ff6b6b; font-weight:bold;">Ошибка загрузки списков.</span>';
            writeLog('[FATAL]: Все сетевые репозитории вернули ошибку.');
            return;
        }
        
        const lines = text.split('\n')
            .map(l => l.trim())
            .filter(l => l.startsWith('https://t.me/proxy') || l.startsWith('tg://proxy'));
        
        writeLog(`[PARSER]: Найдено валидных конфигураций: ${lines.length}`);
        statusEl.style.display = 'none';
        
        function renderList(filterText = '') {
            listContainer.innerHTML = '';
            const query = filterText.toLowerCase();
            
            lines.forEach((line, index) => {
                let serverName = 'Unknown Server';
                let port = '';
                
                try {
                    const cleanUrl = line.replace('tg://', 'https://t.me/');
                    const urlObj = new URL(cleanUrl);
                    const params = new URLSearchParams(urlObj.search);
                    serverName = params.get('server') || serverName;
                    port = params.get('port') ? `:${params.get('port')}` : '';
                } catch (e) { return; }

                if (query && !serverName.toLowerCase().includes(query) && !port.includes(query)) {
                    return;
                }

                // Генерируем два типа ссылок
                const webLink = line.replace('tg://', 'https://t.me/');
                const deepLink = line.replace('https://t.me/', 'tg://');

                const item = document.createElement('a');
                item.className = 'proxy-item';
                // Для внешних браузеров href ОБЯЗАТЕЛЬНО должен быть tg://, чтобы открывать приложение
                item.href = deepLink; 
                item.setAttribute('rel', 'noopener noreferrer');
                
                item.innerHTML = `
                    <div class="proxy-header">
                        <span class="tg-icon">TG</span> MTProto #${index + 1} (${serverName}${port})
                    </div>
                    <div class="proxy-raw">${deepLink}</div>
                `;

                // Умный перехватщик клика
                item.addEventListener('click', (e) => {
                    // Проверяем, запущены ли мы РЕАЛЬНО внутри клиента Telegram как Mini App
                    const isInsideTelegramWebApp = tg && tg.platform !== 'unknown' && tg.initData && tg.initData.length > 0;
                    
                    if (isInsideTelegramWebApp && typeof tg.openTelegramLink === 'function') {
                        e.preventDefault();
                        tg.openTelegramLink(webLink);
                    }
                    // Если открыто в обычном Хроме — preventDefault НЕ срабатывает, 
                    // и браузер нативно обрабатывает href="tg://proxy...", запуская телегу.
                });

                listContainer.appendChild(item);
            });
        }

        searchInput.addEventListener('input', (e) => renderList(e.target.value));
        renderList();
        
        writeLog('[COMPLETE]: Рендеринг завершен. Очистка буфера отладки...');
        
        // Магия плавного исчезновения консоли
        setTimeout(() => {
            if (logEl) {
                logEl.style.opacity = '0';
                logEl.style.marginBottom = '0px';
                setTimeout(() => {
                    logEl.style.display = 'none';
                }, 800);
            }
        }, 2000); 
    }

    initTelegramSDK();
    loadProxies().catch(err => {
        writeLog('[FATAL]: Сбой главного потока: ' + err.message);
    });
</script>

</body>
</html>
